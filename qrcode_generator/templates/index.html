<!DOCTYPE html>
<html>

<head>
    <title>QR Code Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>QR Code Generator</h1>

    <form method="POST">

        <input 
            type="text"
            name="data"
            placeholder="Enter text or URL..."
            required>

        <button type="submit">
            Generate QR Code
        </button>

    </form>

    {% if qr_image_path %}

    <div class="qr-section">

        <h3>Your QR Code:</h3>

        <img src="{{ qr_image_path }}"
             alt="QR Code">

        <br>

        <a href="/download">
            <button class="download-btn">
                Download QR
            </button>
        </a>

    </div>

    {% endif %}
    

</div>


</body>
</html>
